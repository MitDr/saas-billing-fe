<div class="mb-4 flex justify-between">
  <h1 class="text-2xl font-semibold mb-6">
    ENTITLEMENTS LIST
  </h1>
<!--  <ng-container class="mb-4">-->
<!--    <button [routerLink]="createRoute" nz-button nzType="primary">+ Add Entitlement</button>-->
<!--  </ng-container>-->
</div>
<app-editable-data-table
  (bulkDelete)="onBulkDelete($event)"
  (pageChange)="onPageChange($event)"
  (saveRow)="onSaveRow($event)"
  (sizeChange)="onSizeChange($event)"
  [columns]="getColumns()"
  [data]="entitlementPage()"
  [loading]="loading()"
  [routes]="entitlementListRouting"
  [showBulkDelete]="true"
  [showSoftDelete]="false"
  entityName="entitlement(s)"
  viewRoute="/app/tables/entitlements/">
  >
  <div class="flex gap-3 items-center flex-wrap mb-4" table-toolbar>

    <!-- 🔍 Search -->
    <nz-input-wrapper class="w-64">
      <input
        (ngModelChange)="onSearchChange($event)"
        [ngModel]="search()"
        nz-input
        placeholder="Search entitlement..."
      />
    </nz-input-wrapper>

    <!-- 🔄 Reset -->
    <button
      (click)="resetFilters()"
      nz-button
      nzType="default"
    >
      Reset
    </button>

  </div>
  <!-- Toolbar nếu cần -->
</app-editable-data-table>
