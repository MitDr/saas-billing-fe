<div class="p-6 max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold mb-2">Chatbot hỏi đáp tài liệu</h1>
  <nz-card nzTitle="Hỏi đáp tài liệu" class="shadow-md">
    <nz-spin [nzSpinning]="chatLoading()">
      <div class="space-y-6">
          <input
            nz-input
            placeholder="Nhập câu hỏi về tài liệu..."
            [(ngModel)]="query"
            (keyup.enter)="askQuestion()"
            class="h-12 text-base"
          />
          <button
            nz-button
            nzType="primary"
            nzSize="large"
            (click)="askQuestion()"
            [nzLoading]="chatLoading()"
            class="!mt-5 h-12"
          >
            Hỏi ngay
          </button>
        @if (answer()) {
          <div class="mt-5 bg-gray-50 p-6 rounded-lg border border-gray-200">
            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
              <span nz-icon nzType="bulb" class="text-yellow-600"></span>
              Trả lời
            </h3>
            <p class="text-gray-800 whitespace-pre-wrap leading-relaxed">
              {{ answer() }}
            </p>
            @if (sources().length > 0) {
              <nz-divider nzText="Nguồn tham khảo"></nz-divider>
              <nz-descriptions [nzColumn]="1" nzBordered nzSize="small">
                @for (source of sources(); track source.source) {
                  <nz-descriptions-item [nzTitle]="source.source">
                    <div class="text-gray-700">
                      {{ source.content | slice:0:300 }}...
                      <span class="text-xs text-gray-500 ml-2">(trích đoạn)</span>
                    </div>
                  </nz-descriptions-item>
                }
              </nz-descriptions>
            }
          </div>
        } @else if (chatLoading()) {
          <div class="text-center py-8 text-gray-500">
            <nz-spin nzSize="large"></nz-spin>
            <p class="mt-4">Đang tìm kiếm và trả lời...</p>
          </div>
        }
      </div>
    </nz-spin>
  </nz-card>
</div>
