<div class="status-container failed-container">
  <div class="content-wrapper">

    <!-- Visual -->
    <div class="status-visual">
      <div class="status-icon failed">
        <nz-icon nzTheme="fill" nzType="close-circle"></nz-icon>
      </div>
    </div>

    <!-- Title -->
    <h1 class="status-title">Failed!</h1>

    <!-- Subtitle -->
    <p class="status-subtitle">
      Sorry, Your service has encountered some errors.<br>
      Please try again later or contact support
    </p>

    <!-- Buttons -->
    <div class="button-group">
      <button
        nz-button
        nzSize="large"
        nzType="primary"
        routerLink="/app/dashboard">
        <span nz-icon nzTheme="outline" nzType="home"></span>
        Return to dashboard
      </button>
    </div>
  </div>
</div>
